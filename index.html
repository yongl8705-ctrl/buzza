<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <button id="menu-toggle-btn" class="icon-btn" aria-label="메뉴 열기">☰</button>
        <div class="top-title">Stock Dashboard</div>
        <button id="login-open-btn" class="icon-btn" aria-label="로그인 열기">👤</button>
    </header>

    <aside id="side-menu" class="side-menu hidden">
        <a href="index.html">대시보드</a>
        <a href="guide.html">지표 설명</a>
    </aside>

    <main class="page">
        <section class="container">
            <header class="hero">
                <p id="subtitle-text" class="subtitle">기준일: 로딩 중</p>
                <button id="theme-toggle-btn" type="button" class="theme-btn">Light Mode</button>
            </header>

            <section class="panel">
                <div class="panel-head">
                    <h2>Economic Risk Indicators</h2>
                    <span id="risk-summary" class="badge neutral">Loading</span>
                </div>
                <div id="risk-grid" class="risk-grid"></div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>Stocks</h2>
                    <span id="row-count" class="badge neutral">0 종목</span>
                </div>
                <div class="filters">
                    <label for="ticker-input">Ticker Add</label>
                    <div class="add-wrap">
                        <input id="ticker-input" type="text" placeholder="AAPL, TSLA, QQQ ...">
                        <button id="add-ticker-btn" type="button">Add</button>
                    </div>
                    <p id="add-message" class="add-message"></p>
                    <label for="table-search">Table Search</label>
                    <input id="table-search" type="text" placeholder="Search by ticker or name">
                    <label class="checkbox-wrap" for="entry-only">
                        <input id="entry-only" type="checkbox">
                        <span>추천 RSI 이하 종목만 보기</span>
                    </label>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>티커</th>
                                <th>이름</th>
                                <th>현재가</th>
                                <th>거래량</th>
                                <th>RSI</th>
                                <th>추천 RSI</th>
                                <th>진입경과</th>
                                <th>1D%</th>
                                <th>20D%</th>
                                <th>50D%</th>
                                <th>200D%</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="screening-body"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <div id="chart-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="chart-modal-title">
        <div class="modal-backdrop" data-close-modal="true"></div>
        <div class="modal-card">
            <div class="modal-head">
                <h3 id="chart-modal-title">3개월 일봉 차트</h3>
                <button id="chart-modal-close" type="button" class="modal-close-btn">닫기</button>
            </div>
            <p id="chart-modal-subtitle" class="modal-subtitle"></p>
            <div class="chart-wrap">
                <svg id="daily-chart-svg" class="daily-chart" viewBox="0 0 920 360" preserveAspectRatio="none"></svg>
                <div id="daily-chart-tip" class="chart-tip hidden"></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
        <div class="modal-backdrop" data-close-login="true"></div>
        <div class="modal-card login-card">
            <div class="modal-head">
                <h3 id="login-modal-title">로그인 및 설정 저장</h3>
                <button id="login-modal-close" type="button" class="modal-close-btn">닫기</button>
            </div>
            <p id="auth-status" class="modal-subtitle">로그인 안됨 (게스트 모드)</p>
            <p class="modal-subtitle">구글로 로그인하면 현재 테마/티커/필터 설정을 저장할 수 있습니다.</p>
            <div class="auth-wrap">
                <button id="google-login-btn" type="button">Google로 계속하기</button>
                <button id="logout-btn" type="button">로그아웃</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
