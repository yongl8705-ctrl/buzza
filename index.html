<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screening Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <section class="container">
            <header class="hero">
                <h1>Stock Screening Dashboard</h1>
                <p class="subtitle">
                    Evan Traders screening-style indicators in one view.
                </p>
            </header>

            <section class="panel">
                <div class="panel-head">
                    <h2>Stocks</h2>
                </div>
                <div class="filters">
                    <label for="ticker-input">Ticker Add</label>
                    <div class="add-wrap">
                        <input id="ticker-input" type="text" placeholder="AAPL, TSLA, QQQ ...">
                        <button id="add-ticker-btn" type="button">Add</button>
                    </div>
                    <p id="add-message" class="add-message"></p>
                    <label for="table-search">Table Search</label>
                    <input id="table-search" type="text" placeholder="Search by ticker or name">
                    <label class="checkbox-wrap" for="entry-only">
                        <input id="entry-only" type="checkbox">
                        <span>추천 RSI 이하 종목만 보기</span>
                    </label>
                </div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>Economic Risk Indicators</h2>
                    <span id="risk-summary" class="badge neutral">Loading</span>
                </div>
                <div id="risk-grid" class="risk-grid"></div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>종목 스크리닝 전체 보기</h2>
                    <span id="row-count" class="badge neutral">0 종목</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>티커</th>
                                <th>이름</th>
                                <th>현재가</th>
                                <th>거래량</th>
                                <th>RSI</th>
                                <th>추천 RSI</th>
                                <th>진입경과</th>
                                <th>1D%</th>
                                <th>20D%</th>
                                <th>50D%</th>
                                <th>200D%</th>
                            </tr>
                        </thead>
                        <tbody id="screening-body"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
